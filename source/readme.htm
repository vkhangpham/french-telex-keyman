<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>French Telex</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
      margin: 2rem auto;
      max-width: 44rem;
      padding: 0 1rem;
    }
    code { font-family: ui-monospace, SFMono-Regular, monospace; }
  </style>
</head>
<body>
  <h1>French Telex</h1>
  <p>French input for Keyman using Vietnamese-Telex-like postfix rules.</p>
  <p>Examples: <code>eslesves</code> -> <code>élévé</code>, <code>franc,ais</code> -> <code>français</code>.</p>
  <p>Escape a trigger literally with backslash, for example <code>e\s</code> -> <code>es</code>.</p>
</body>
</html>
