name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Keyman compiler
        run: npm install -g @keymanapp/kmc@18

      - name: Build keyboard package
        run: kmc build "$GITHUB_WORKSPACE/french_telex.kpj"

      - name: Verify release artifacts exist
        run: |
          test -f build/french_telex.kmp
          test -f build/french_telex.kmx
          find build -maxdepth 1 -name '*.keyboard_info' -print -quit | grep -q .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: french-telex-build
          if-no-files-found: error
          path: |
            build/french_telex.kmp
            build/french_telex.kmx
            build/*.keyboard_info

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: french-telex-build
          path: .

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --generate-notes
          fi

          gh release upload "$TAG" \
            build/french_telex.kmp \
            build/french_telex.kmx \
            build/*.keyboard_info \
            --clobber
